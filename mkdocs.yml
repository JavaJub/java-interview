site_name: JavaJub · Java собеседование и вопросы
site_description: "JavaJub: реальные вопросы с Java собеседований, гайды по компаниям, тесты и маршруты подготовки под Java вакансии Junior, Middle, Senior и AQA."
site_url: https://www.javajub.com/
repo_url: https://github.com/JavaJub/java-interview
repo_name: JavaJub/java-interview
docs_dir: docs
site_dir: site
not_in_nav: |
  404.md
  quizzes/topics/*.md
  quizzes/companies/*.md

theme:
  name: material
  custom_dir: overrides
  language: ru
  logo: assets/images/javajub-mark-transparent.png
  favicon: favicon.ico
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

hooks:
  - tools/faq_hook.py

plugins:
  - search:
      lang:
        - ru
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/css/brand.css
  - assets/css/quiz.css

extra_javascript:
  - assets/js/analytics.js
  - assets/js/quiz.js

extra:
  social_image: assets/images/og-javajub.png
  logo_image: assets/images/javajub-logo-transparent.png
  favicon_ico: favicon.ico
  favicon_png: favicon.png
  apple_touch_icon: apple-touch-icon.png
  # Заполните токеном из Yandex Webmaster, чтобы подтвердить домен.
  yandex_verification: ""
  # Числовой ID счётчика Yandex.Metrika (например, 12345678). Пусто = аналитика выключена.
  ym_counter_id: ""

nav:
  - Старт: index.md
  - Гайды:
      - "Java собеседование: вопросы": java-sobesedovanie.md
      - companies.md
      - Сбер · Java Middle: guides/sber.md
      - SberSeasons · стажировка: guides/sber-internship.md
      - Альфа-Банк · Java Middle: guides/alfa-bank.md
      - Т1 Иннотех · Java Junior/Middle: guides/t1-innotech.md
      - VK · Java Middle: guides/vk.md
      - Яндекс Путешествия · Java Middle: guides/yandex-travel.md
      - МТС Банк · AQA Java Junior: guides/mts-bank-aqa.md
      - ITK Academy · Java Junior: guides/itk-academy.md
      - Лига · Java Middle: guides/liga.md
      - Темы и шпаргалки: TOPICS.md
      - X5 Tech · code review (Senior): tasks/x5-blackfriday-code-review.md
  - Маршруты:
      - Java Junior: roadmaps/java-junior.md
      - Java Middle: roadmaps/java-middle.md
      - AQA Java: roadmaps/java-aqa.md
  - Тесты:
      - quizzes/index.md
      - Тесты по темам: quizzes/topics.md
      - Тесты по компаниям: quizzes/companies.md
  - Вакансии: jobs.md
  - Как помочь: CONTRIBUTING.md
